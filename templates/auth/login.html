<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Masuk - ChatKu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="/static/css/main.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">
      <div class="logo-icon">💬</div>
      <h1>ChatKu</h1>
      <p>Chat real-time gratis & cepat</p>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none rounded-3" role="alert" style="font-size:14px"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-muted" style="font-size:13px">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-input);border-color:var(--border);color:var(--text-muted)"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" placeholder="Masukkan username" required autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-muted" style="font-size:13px">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-input);border-color:var(--border);color:var(--text-muted)"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Masukkan password" required autocomplete="current-password" id="pwInput">
          <button type="button" class="input-group-text" style="background:var(--bg-input);border-color:var(--border);color:var(--text-muted);cursor:pointer" id="togglePw">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-accent w-100 py-3 rounded-3" id="loginBtn" style="font-size:16px">
        <span id="btnText">Masuk</span>
        <span id="btnSpinner" class="d-none"><span class="spinner-border spinner-border-sm me-2"></span>Loading...</span>
      </button>
    </form>

    <div class="text-center mt-4" style="font-size:14px;color:var(--text-muted)">
      Belum punya akun? <a href="/register" style="color:var(--accent);font-weight:600">Daftar sekarang</a>
    </div>

    <div class="mt-4 p-3 rounded-3" style="background:rgba(0,168,132,0.08);border:1px solid rgba(0,168,132,0.2)">
      <div style="font-size:12px;color:var(--text-muted);text-align:center">
        <i class="bi bi-shield-check text-success me-1"></i>
        Data kamu aman & terenkripsi
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePw')?.addEventListener('click', () => {
    const pw = document.getElementById('pwInput') || document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const errDiv = document.getElementById('errorAlert');

    btnText.classList.add('d-none');
    btnSpinner.classList.remove('d-none');
    btn.disabled = true;
    errDiv.classList.add('d-none');

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect;
      } else {
        errDiv.textContent = data.message || 'Terjadi kesalahan';
        errDiv.classList.remove('d-none');
      }
    } catch {
      errDiv.textContent = 'Koneksi bermasalah, coba lagi';
      errDiv.classList.remove('d-none');
    } finally {
      btnText.classList.remove('d-none');
      btnSpinner.classList.add('d-none');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
